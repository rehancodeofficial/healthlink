version: "3.8"

services:
  backend:
    build: ./backend
    container_name: HealthLink-backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: HealthLink-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
